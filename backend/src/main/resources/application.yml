gemini:
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  api-key: ${GEMINI_API_KEY:}
  connect-timeout-seconds: ${GEMINI_CONNECT_TIMEOUT_SECONDS:20}
  read-timeout-seconds: ${GEMINI_READ_TIMEOUT_SECONDS:45}
  write-timeout-seconds: ${GEMINI_WRITE_TIMEOUT_SECONDS:45}
  call-timeout-seconds: ${GEMINI_CALL_TIMEOUT_SECONDS:60}
  max-retries: ${GEMINI_MAX_RETRIES:2}

ai:
  primary-provider: ${AI_PRIMARY_PROVIDER:gemini}
  fallback-provider: ${AI_FALLBACK_PROVIDER:openai}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com}

openrouter:
  api-key: ${OPENROUTER_API_KEY:}
  model: ${OPENROUTER_MODEL:openai/gpt-4o-mini}
  base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api}

adzuna:
  app-id: ${ADZUNA_APP_ID:}
  app-key: ${ADZUNA_APP_KEY:}
  country: ${ADZUNA_COUNTRY:za}

whatsapp:
  bot:
    enabled: ${WHATSAPP_BOT_ENABLED:false}
  verify-token: ${WHATSAPP_VERIFY_TOKEN:}

spring:
  config:
    import: "optional:file:.env[.properties],optional:file:backend/.env[.properties],optional:file:../.env[.properties]"

  application:
    name: edurite-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/edurite}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    open-in-view: false
    show-sql: ${SPRING_JPA_SHOW_SQL:false}

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: ${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      repositories:
        enabled: false

  cache:
    type: simple

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
            redirect-uri: ${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:framework}

security:
  jwt:
    secret: ${JWT_SECRET:change-me}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  backend-base-url: ${BACKEND_BASE_URL:http://localhost:8080}

  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:${APP_BASE_URL:http://localhost:5173}}

  frontend-url: ${APP_FRONTEND_URL:${APP_FRONTEND_BASE_URL:${APP_BASE_URL:http://localhost:5173}}}

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,http://192.168.1.120:5173,http://192.168.1.120:5174,http://edurite.net,http://www.edurite.net,https://edurite.net,https://www.edurite.net}

  popi:
    consent-version: ${POPI_CONSENT_VERSION:v1.0}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

edurite:
  flyway:
    repair-on-startup: ${EDURITE_FLYWAY_REPAIR_ON_STARTUP:false}
  seed:
    enabled: ${EDURITE_SEED_ENABLED:false}
  admin:
    seed:
      enabled: ${EDURITE_ADMIN_SEED_ENABLED:false}
    email: ${EDURITE_ADMIN_EMAIL:}
    password: ${EDURITE_ADMIN_PASSWORD:}
    first-name: ${EDURITE_ADMIN_FIRST_NAME:}
    last-name: ${EDURITE_ADMIN_LAST_NAME:}

  auth:
    seed:
      admin:
        email: ${EDURITE_AUTH_SEED_ADMIN_EMAIL:admin@edurite.com}
        password: ${EDURITE_AUTH_SEED_ADMIN_PASSWORD:Admin@123}
      student:
        email: ${EDURITE_AUTH_SEED_STUDENT_EMAIL:arnoldmadaz@gmail.com}
        password: ${EDURITE_AUTH_SEED_STUDENT_PASSWORD:Student@123}
      company:
        email: ${EDURITE_AUTH_SEED_COMPANY_EMAIL:company@edurite.com}
        password: ${EDURITE_AUTH_SEED_COMPANY_PASSWORD:Company@123}

    otp:
      enabled: ${OTP_ENABLED:true}

      twilio:
        account-sid: ${TWILIO_ACCOUNT_SID:}
        auth-token: ${TWILIO_AUTH_TOKEN:}
        verify-service-sid: ${TWILIO_VERIFY_SERVICE_SID:}
        base-url: ${TWILIO_VERIFY_BASE_URL:https://verify.twilio.com/v2}

    google:
      enabled: ${GOOGLE_OAUTH_ENABLED:false}
      client-id: ${GOOGLE_CLIENT_ID:}
      token-info-url: ${GOOGLE_TOKEN_INFO_URL:https://oauth2.googleapis.com/tokeninfo}

  payment:
    provider: ${PAYMENT_PROVIDER:payfast}
    callback-url: ${PAYMENT_CALLBACK_URL:http://localhost:8080/api/payments/callback}
    api-key: ${PAYMENT_GATEWAY_API_KEY:}
    secret: ${PAYMENT_GATEWAY_SECRET:}
    base-url: ${PAYMENT_GATEWAY_BASE_URL:}

    payfast:
      merchant-id: ${PAYFAST_MERCHANT_ID:}
      merchant-key: ${PAYFAST_MERCHANT_KEY:}
      passphrase: ${PAYFAST_PASSPHRASE:}
      sandbox: ${PAYFAST_SANDBOX:true}
      debug-signature: ${PAYFAST_DEBUG_SIGNATURE:false}
      process-url: ${PAYFAST_PROCESS_URL:https://sandbox.payfast.co.za/eng/process}
      validate-url: ${PAYFAST_VALIDATE_URL:https://sandbox.payfast.co.za/eng/query/validate}
      return-url: ${PAYFAST_RETURN_URL:}
      cancel-url: ${PAYFAST_CANCEL_URL:}
      notify-url: ${PAYFAST_NOTIFY_URL:}

  bursary:
    fallback:
      trusted-domains: ${EDURITE_BURSARY_TRUSTED_DOMAINS:bursaries-southafrica.co.za,zabursaries.co.za,careerwise.co.za,gov.za}
      max-results: ${EDURITE_BURSARY_FALLBACK_MAX_RESULTS:5}

  university:
    crawl:
      cron: "0 0 2 * * *"
      timeout-ms: 10000
      max-fetch-retries: 2
      retry-backoff-max-ms: 2000
      fetch-concurrency: 6
      overall-fetch-timeout-ms: 18000
      discovery-score-threshold: 3
      max-body-size-bytes: 1500000
      max-discovered-candidates-per-university: 24
      max-fetched-pages-per-university: 6
      max-crawl-depth: 1
      candidate-paths:
        - "/programmes"
        - "/programs"
        - "/study"
        - "/studies"
        - "/courses"
        - "/course-finder"
        - "/undergraduate"
        - "/postgraduate"
        - "/faculties"
        - "/admissions"
        - "/academic-programmes"

    registry:
      - university-name: "University of Cape Town"
        base-domain: "uct.ac.za"
        allowed-domains: ["uct.ac.za"]
        seed-urls:
          - "https://www.uct.ac.za/"
          - "https://www.uct.ac.za/programmes"
        qualification-levels-supported: ["Undergraduate", "Postgraduate"]
        active: true
        crawl-priority: 1

