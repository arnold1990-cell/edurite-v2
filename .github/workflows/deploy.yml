name: Deploy EduRite

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: GitHub Actions Diagnostics
        run: |
          set -euo pipefail
          echo "==> GitHub Actions diagnostics"
          echo "pwd: $(pwd)"
          ls -la
          echo "whoami: $(whoami)"
          echo "hostname: $(hostname)"
          echo "github.workspace: ${GITHUB_WORKSPACE}"
          echo "repository root:"
          git rev-parse --show-toplevel

      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -euo pipefail

            echo "==> Remote diagnostics"
            echo "pwd: $(pwd)"
            ls -la
            echo "whoami: $(whoami)"
            echo "hostname: $(hostname)"
            docker compose ps || true

            REPO_URL="https://github.com/arnold1990-cell/edurite-v2.git"
            CANDIDATES="
            /opt/edurite-v2
            /opt/edurite-ai-career-guidance-clean
            $HOME/edurite-v2
            $HOME/edurite-ai-career-guidance-clean
            $HOME/projects/edurite-v2
            $HOME/projects/edurite-ai-career-guidance-clean
            "

            PROJECT_DIR=""
            for dir in $CANDIDATES; do
              if [ -d "$dir/.git" ] || [ -f "$dir/docker-compose.yml" ]; then
                PROJECT_DIR="$dir"
                break
              fi
            done

            if [ -z "$PROJECT_DIR" ]; then
              echo "==> Searching for repository"
              FOUND_DIR="$(find /opt "$HOME" -maxdepth 4 -type d -name 'edurite*' 2>/dev/null | head -n 1 || true)"
              if [ -n "$FOUND_DIR" ]; then
                PROJECT_DIR="$FOUND_DIR"
              fi
            fi

            if [ -z "$PROJECT_DIR" ]; then
              echo "==> Repository not found. Attempting clone."
              for dir in /opt/edurite-v2 /opt/edurite-ai-career-guidance-clean "$HOME/projects/edurite-v2" "$HOME/edurite-v2"; do
                parent_dir="$(dirname "$dir")"
                if [ -d "$parent_dir" ] && [ -w "$parent_dir" ]; then
                  PROJECT_DIR="$dir"
                  break
                fi
              done

              if [ -z "$PROJECT_DIR" ]; then
                echo "ERROR: Could not find a writable target directory for the repository."
                echo "Checked candidates:"
                printf '%s\n' $CANDIDATES
                exit 1
              fi

              git clone "$REPO_URL" "$PROJECT_DIR"
              echo "==> Clone completed"
            fi

            if [ ! -d "$PROJECT_DIR" ]; then
              echo "ERROR: Resolved project directory does not exist: $PROJECT_DIR"
              exit 1
            fi

            if ! cd "$PROJECT_DIR"; then
              echo "ERROR: Failed to enter project directory: $PROJECT_DIR"
              ls -la "$(dirname "$PROJECT_DIR")" || true
              exit 1
            fi

            echo "==> Using project directory: $PROJECT_DIR"
            echo "pwd: $(pwd)"
            ls -la

            if [ ! -f "docker-compose.yml" ]; then
              echo "ERROR: docker-compose.yml not found in $PROJECT_DIR"
              exit 1
            fi

            if [ ! -d ".git" ]; then
              echo "ERROR: $PROJECT_DIR exists but is not a git repository."
              exit 1
            fi

            echo "==> Pulling latest code from origin/main"
            git pull origin main
            echo "==> Deploying commit $(git rev-parse --short HEAD)"

            echo "==> Stopping existing containers"
            docker compose down || true

            echo "==> Building images with plain progress"
            docker compose build --progress=plain

            echo "==> Starting containers"
            docker compose up -d --build

            echo "==> Container status after startup"
            docker compose ps || true

            echo "==> Verifying frontend bundle is a fresh Vite build"
            if docker exec edurite-frontend test -f /usr/share/nginx/html/assets/main.js; then
              echo "ERROR: Legacy /assets/main.js is still present in the deployed frontend image."
              exit 1
            fi
            if docker exec edurite-frontend sh -lc 'grep -R "import.meta.glob" /usr/share/nginx/html/assets >/dev/null'; then
              echo "ERROR: Deployed frontend assets still contain import.meta.glob."
              exit 1
            fi
            if ! curl -fsS http://localhost:5173/ | grep -Eq '/assets/index-[^"]+\\.js'; then
              echo "ERROR: Frontend HTML is not serving a Vite hashed JavaScript asset."
              exit 1
            fi

            echo "==> Waiting for backend health"
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:8080/actuator/health; then
                echo
                echo "Backend healthy."
                exit 0
              fi
              echo "Waiting for backend..."
              sleep 10
            done

            echo "==> Backend did not become healthy. Collecting diagnostics."
            docker compose ps || true
            docker compose logs --tail=300 backend || true
            docker compose logs --tail=100 postgres || true
            docker compose logs --tail=100 redis || true
            docker images || true
            docker system df || true
            free -h || true
            df -h || true
            exit 1
