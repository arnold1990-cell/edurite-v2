name: Deploy EduRite to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: edurite-production-deploy
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend type check and lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH_CLIENT_ID }}
          VITE_GOOGLE_SIGNIN_ENABLED: ${{ secrets.VITE_GOOGLE_SIGNIN_ENABLED || 'false' }}
          VITE_GOOGLE_OAUTH_ENABLED: ${{ secrets.VITE_GOOGLE_OAUTH_ENABLED || 'false' }}
          VITE_AI_GUIDANCE_DEMO_MODE: ${{ secrets.VITE_AI_GUIDANCE_DEMO_MODE || 'false' }}
          VITE_YOUTUBE_API_KEY: ${{ secrets.VITE_YOUTUBE_API_KEY }}
        run: npm run build

      - name: Backend tests
        working-directory: backend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: mvn test -q

      - name: Backend package
        working-directory: backend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: mvn -q -DskipTests package

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 25
    environment: production

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          port: ${{ secrets.EC2_PORT }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            cd /opt/edurite-ai-career-guidance-clean

            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            docker compose down --remove-orphans
            docker compose up -d --build

            echo "Waiting for PostgreSQL..."
            timeout 180 bash -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" edurite-postgres 2>/dev/null || true)" = "healthy" ]; do sleep 5; done'

            echo "Waiting for Redis..."
            timeout 180 bash -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" edurite-redis 2>/dev/null || true)" = "healthy" ]; do sleep 5; done'

            echo "Waiting for Backend..."
            timeout 240 bash -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" edurite-backend 2>/dev/null || true)" = "healthy" ]; do sleep 5; done'

            echo "Waiting for Frontend..."
            timeout 180 bash -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" edurite-frontend 2>/dev/null || true)" = "healthy" ]; do sleep 5; done'

            echo "Checking backend health..."
            curl -fsS http://127.0.0.1:${BACKEND_HOST_PORT:-8080}/actuator/health

            echo "Checking frontend..."
            curl -fsS http://127.0.0.1:${FRONTEND_HOST_PORT:-5173}/ >/dev/null

            docker compose ps