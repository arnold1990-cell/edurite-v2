name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: edurite
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: edurite_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d edurite"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build backend
        working-directory: backend
        env:
          EDURITE_TEST_DB_URL: jdbc:postgresql://localhost:5432/edurite
          EDURITE_TEST_DB_USERNAME: postgres
          EDURITE_TEST_DB_PASSWORD: edurite_ci_password
        run: mvn -B clean verify
      - name: Print backend test reports
        if: failure()
        run: |
          find backend/target/surefire-reports -type f -name "*.txt" -print -exec cat {} \;

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build
      - name: Verify built assets
        run: npm run check:dist
      - name: Start Vite preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > ../frontend-preview.log 2>&1 &
          echo $! > ../frontend-preview.pid
      - name: Verify preview routes and assets
        run: npm run check:served-build -- http://127.0.0.1:4173
      - name: Verify Docker Nginx serves the built frontend
        working-directory: .
        run: |
          docker build -t edurite-frontend-ci ./frontend
          docker run -d --rm -p 8088:80 --name edurite-frontend-ci edurite-frontend-ci
          node ./frontend/scripts/verify-served-build.mjs http://127.0.0.1:8088
      - name: Print frontend preview log
        if: failure()
        working-directory: .
        run: cat frontend-preview.log || true
      - name: Stop frontend preview and Docker container
        if: always()
        working-directory: .
        run: |
          if [ -f frontend-preview.pid ]; then kill $(cat frontend-preview.pid) || true; fi
          docker stop edurite-frontend-ci || true
