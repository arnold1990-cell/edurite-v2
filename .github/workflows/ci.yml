name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: edurite
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: edurite_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d edurite"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build backend
        working-directory: backend
        env:
          EDURITE_TEST_DB_URL: jdbc:postgresql://localhost:5432/edurite
          EDURITE_TEST_DB_USERNAME: postgres
          EDURITE_TEST_DB_PASSWORD: edurite_ci_password
        run: mvn -B clean verify
      - name: Print backend test reports
        if: failure()
        run: |
          find backend/target/surefire-reports -type f -name "*.txt" -print -exec cat {} \;
